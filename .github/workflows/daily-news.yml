name: Daily science news collection

on:
  schedule:
    # 10:00 KST = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate collector syntax
        run: python -m py_compile scripts/collect_news.py

      - name: Collect daily news and papers
        run: python scripts/collect_news.py

      - name: Commit collected posts
        run: |
          if [ -n "$(git status --porcelain src/content/news data/seen_urls.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/content/news data/seen_urls.json
            git commit -m "Add daily science news posts"
            git push
          else
            echo "No new posts to commit."
          fi
